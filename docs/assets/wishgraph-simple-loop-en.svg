      <stop offset="0" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#F3F6FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#26324A" flood-opacity="0.12"/>
    </filter>
    <style>
      .label {
        font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 42px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>
  <rect width="1800" height="600" rx="36" fill="url(#bg)"/>
  <g fill="#7B879D" stroke="#7B879D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M430 300 H500"/><path d="M500 278 L530 300 L500 322 Z"/>
    <path d="M850 300 H920"/><path d="M920 278 L950 300 L920 322 Z"/>
    <path d="M1270 300 H1340"/><path d="M1340 278 L1370 300 L1340 322 Z"/>
