<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">WishGraph mark</title>
  <desc id="desc">Connected graph nodes form a W-shaped path ending in a verified project state.</desc>
  <defs>
    <linearGradient id="surface" x1="20" y1="10" x2="140" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#766FF6"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#172033" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="136" height="136" rx="38" fill="url(#surface)" filter="url(#shadow)"/>
  <path d="M39 52 58 108 80 72 102 108 121 52" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#fff">
    <circle cx="39" cy="52" r="8"/>
    <circle cx="58" cy="108" r="8"/>
    <circle cx="80" cy="72" r="8"/>
    <circle cx="102" cy="108" r="8"/>
  </g>
  <circle cx="121" cy="52" r="13" fill="#14A878" stroke="#fff" stroke-width="5"/>
  <path d="m115 52 4 4 8-9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
