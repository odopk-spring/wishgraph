<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="600" viewBox="0 0 1800 600" role="img" aria-label="讨论、Worker、集成、再讨论的循环">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#F3F6FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#26324A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L12 6 L0 12 Z" fill="#7B879D"/>
    </marker>
    <style>
      .label {
        font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        font-size: 48px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <rect width="1800" height="600" rx="36" fill="url(#bg)"/>

  <g fill="none" stroke="#7B879D" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M430 300 H530"/>
    <path d="M850 300 H950"/>
    <path d="M1270 300 H1370"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="195" width="320" height="210" rx="42" fill="#FFFFFF" stroke="#DEDFFB" stroke-width="3"/>
    <rect x="530" y="195" width="320" height="210" rx="42" fill="#FFFFFF" stroke="#D9E6FC" stroke-width="3"/>
    <rect x="950" y="195" width="320" height="210" rx="42" fill="#FFFFFF" stroke="#D5F0E7" stroke-width="3"/>
    <rect x="1370" y="195" width="320" height="210" rx="42" fill="#FFFFFF" stroke="#DEDFFB" stroke-width="3"/>
  </g>

  <text x="270" y="305" class="label" fill="#5F5BEF">讨论</text>
  <text x="690" y="305" class="label" fill="#2E72E8">Worker</text>
  <text x="1110" y="305" class="label" fill="#12A777">集成</text>
  <text x="1530" y="305" class="label" fill="#5F5BEF">再讨论</text>
</svg>
