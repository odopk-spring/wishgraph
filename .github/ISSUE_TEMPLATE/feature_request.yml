name: Feature request
description: Propose a concrete WishGraph capability or compatibility improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-visible workflow is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior rather than an implementation preference.
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Affected boundary
      options: [Installation, Discussion, Worker, Integration, Runtime hooks, Codex adapter, Claude adapter, Documentation, Other]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: How could maintainers prove the outcome works without weakening authority or evidence?
